<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Employee Leave Management</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    padding:40px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#1e3c72;
    margin-bottom:30px;
}

.form-box{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.btn{
    background:#1e88e5;
    color:white;
    border:none;
    padding:14px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    width:200px;
}

.btn:hover{
    background:#1565c0;
}

.search-box{
    margin:20px 0;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#1e3c72;
    color:white;
    padding:15px;
    font-size:18px;
}

td{
    padding:15px;
    text-align:center;
    font-size:16px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f5f5f5;
}

.approve{
    background:#28a745;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

.reject{
    background:#dc3545;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

.delete{
    background:#6c757d;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

.status-pending{
    color:orange;
    font-weight:bold;
}

.status-approved{
    color:green;
    font-weight:bold;
}

.status-rejected{
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>HR Employee Leave Management System</h1>

<div class="form-box">
<input type="text" id="name" placeholder="Employee Name">

<input type="text" id="reason" placeholder="Leave Reason">
</div>

<button class="btn" onclick="applyLeave()">Apply Leave</button>

<div class="search-box">
<input type="text" id="search" placeholder="Search Employee" onkeyup="filterEmployee()">
</div>

<table id="leaveTable">

<tr>
<th>Employee Name</th>
<th>Leave Reason</th>
<th>Status</th>
<th>Actions</th>
</tr>

</table>

</div>

<script>

function applyLeave(){

let name=document.getElementById("name").value;
let reason=document.getElementById("reason").value;

if(name==="" || reason===""){
alert("Please Fill All Fields");
return;
}

let table=document.getElementById("leaveTable");

let row=table.insertRow();

row.insertCell(0).innerHTML=name;
row.insertCell(1).innerHTML=reason;
row.insertCell(2).innerHTML='<span class="status-pending">Pending</span>';

row.insertCell(3).innerHTML=
`
<button class="approve" onclick="approve(this)">Approve</button>
<button class="reject" onclick="reject(this)">Reject</button>
<button class="delete" onclick="deleteRow(this)">Delete</button>
`;

document.getElementById("name").value="";
document.getElementById("reason").value="";
}

function approve(btn){
btn.parentNode.parentNode.cells[2].innerHTML=
'<span class="status-approved">Approved</span>';
}

function reject(btn){
btn.parentNode.parentNode.cells[2].innerHTML=
'<span class="status-rejected">Rejected</span>';
}

function deleteRow(btn){
btn.parentNode.parentNode.remove();
}

function filterEmployee(){

let input=document.getElementById("search").value.toLowerCase();

let rows=document.getElementById("leaveTable").getElementsByTagName("tr");

for(let i=1;i<rows.length;i++){

let name=rows[i].cells[0].innerText.toLowerCase();

rows[i].style.display=
name.includes(input) ? "" : "none";
}
}

</script>

</body>
</html>
