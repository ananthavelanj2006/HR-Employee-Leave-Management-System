<body>

<div class="container">

<h1>HR Employee Leave Management System</h1>

<div class="form-box">
<input type="text" id="name" placeholder="Employee Name">

<input type="text" id="reason" placeholder="Leave Reason">
</div>

<button class="btn" onclick="applyLeave()">Apply Leave</button>

<div class="search-box">
<input type="text" id="search" placeholder="Search Employee" onkeyup="filterEmployee()">
</div>

<table id="leaveTable">

<tr>
<th>Employee Name</th>
<th>Leave Reason</th>
<th>Status</th>
<th>Actions</th>
</tr>

</table>

</div>

<script>

function applyLeave(){

let name=document.getElementById("name").value;
let reason=document.getElementById("reason").value;

if(name==="" || reason===""){
alert("Please Fill All Fields");
return;
}

let table=document.getElementById("leaveTable");

let row=table.insertRow();

row.insertCell(0).innerHTML=name;
row.insertCell(1).innerHTML=reason;
row.insertCell(2).innerHTML='<span class="status-pending">Pending</span>';

row.insertCell(3).innerHTML=
`
<button class="approve" onclick="approve(this)">Approve</button>
<button class="reject" onclick="reject(this)">Reject</button>
<button class="delete" onclick="deleteRow(this)">Delete</button>
`;

document.getElementById("name").value="";
document.getElementById("reason").value="";
}

function approve(btn){
btn.parentNode.parentNode.cells[2].innerHTML=
'<span class="status-approved">Approved</span>';
}

function reject(btn){
btn.parentNode.parentNode.cells[2].innerHTML=
'<span class="status-rejected">Rejected</span>';
}

function deleteRow(btn){
btn.parentNode.parentNode.remove();
}

function filterEmployee(){

let input=document.getElementById("search").value.toLowerCase();

let rows=document.getElementById("leaveTable").getElementsByTagName("tr");

for(let i=1;i<rows.length;i++){

let name=rows[i].cells[0].innerText.toLowerCase();

rows[i].style.display=
name.includes(input) ? "" : "none";
}
}

</script>

</body>
